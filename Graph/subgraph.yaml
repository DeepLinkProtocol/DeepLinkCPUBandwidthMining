specVersion: 1.2.0
indexerHints:
  # `prune: auto` discards historical entity versions, which breaks
  # block-pinned time-travel queries (`block: { number: N }`). Disable
  # pruning so v2's query semantics match what we historically shipped.
  prune: never
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NFTStaking
    network: deepbrainchain-mainnet
    source:
      address: "0xc663ee691f98d80e5f1cce3c9ad53a14da676a23"
      abi: NFTStaking
      startBlock: 1399265
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - StateSummary
        - StakeHolder
        - MachineInfo
        - RegionInfo
        - RegionBurnInfo
        - ClaimedEvent
        - StakedEvent
        - UnstakedEvent
        - SlashEvent
        - MachineLifecycleEvent
        - DepositRewardEvent
        - RewardRateUpdateEvent
        - StateSummaryDaily
        - RegionDaily
        - HolderDaily
      abis:
        - name: NFTStaking
          file: ./abis/NFTStaking.json
      eventHandlers:
        - event: MoveToReserveAmount(string,address,uint256)
          handler: handleMoveToReserveAmount
        - event: Claimed(indexed address,string,uint256,uint256,uint256,bool)
          handler: handleClaimed
        - event: PaySlash(string,address,uint256)
          handler: handlePaySlash
        - event: ReserveDLC(string,uint256)
          handler: handleReserveDLC
        - event: Staked(indexed address,string,uint256,uint256,string)
          handler: handleStaked
        - event: Unstaked(indexed address,string,uint256)
          handler: handleUnstaked
        - event: BurnedInactiveSingleRegionRewards(string,uint256)
          handler: handleBurnedInactiveSingleRegionRewards
        - event: BurnedInactiveRegionRewards(uint256)
          handler: handleBurnedInactiveRegionRewards
        - event: MachineRegister(string,uint256)
          handler: handleMachineRegister
        - event: MachineUnregister(string,uint256)
          handler: handleMachineUnregister
        - event: RentMachine(string)
          handler: handleRentMachine
        - event: EndRentMachine(string)
          handler: handleEndRentMachine
        - event: ReportMachineFault(string,uint256,address)
          handler: handleReportMachineFault
        - event: SlashMachineOnOffline(indexed address,string,uint256)
          handler: handleSlashMachineOnOffline
        - event: AddBackCalcPointOnOnline(string,uint256)
          handler: handleAddBackCalcPointOnOnline
        - event: ExitStakingForOffline(string,address)
          handler: handleExitStakingForOffline
        - event: RecoverRewarding(string,address)
          handler: handleRecoverRewarding
        - event: DepositReward(uint256)
          handler: handleDepositReward
        - event: RewardsPerCalcPointUpdate(uint256,uint256)
          handler: handleRewardsPerCalcPointUpdate
      file: ./src/nft-staking.ts
