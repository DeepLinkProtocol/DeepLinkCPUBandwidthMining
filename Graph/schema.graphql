type StateSummary @entity {
  id: Bytes!
  totalGPUCount: BigInt! # uint256
  totalStakingGPUCount: BigInt! # uint256
  totalCalcPointPoolCount: BigInt! # uint256
  totalBurnedReward: BigInt! # uint256
  totalReservedAmount: BigInt! # uint256
  totalCalcPoint: BigInt! # uint256
  totalRegionCount: BigInt! # uint256
}



type StakeHolder @entity {
  id: Bytes!
  holder: Bytes! # address
  totalCalcPoint: BigInt! # uint256
  fullTotalCalcPoint: BigInt! # uint256
  machineCount: BigInt! # uint256
  totalStakingGPUCount: BigInt! # uint256
  totalReservedAmount: BigInt! # uint256
  totalClaimedRewardAmount: BigInt! # uint256
  totalReleasedRewardAmount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  machineInfos: [MachineInfo!]! @derivedFrom(field: "holderRef")
}

type MachineInfo @entity {
  id: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  holderRef: StakeHolder! @belongsTo(field: "holder")  # ‌:ml-citation{ref="1,2" data="citationList"}
  regionRef: RegionInfo! @belongsTo(field: "region")  # ‌:ml-citation{ref="1,2" data="citationList"}

  holder: Bytes! # address
  machineId: String!
  totalCalcPoint: BigInt! # uint256
  totalCalcPointWithNFT: BigInt! # uint256
  fullTotalCalcPoint: BigInt! # uint256
  totalReservedAmount: BigInt! # uint256
  isStaking: Boolean!
  online: Boolean!
  registered: Boolean!
  region: String!
  totalClaimedRewardAmount: BigInt! # uint256
  totalReleasedRewardAmount: BigInt! # uint256
}

type RegionInfo @entity {
  id: Bytes!
  region: String!
  totalMachineCount: BigInt! # uint256
  totalBandwidth: BigInt! # uint256
  stakingMachineCount: BigInt! # uint256
  stakingBandwidth: BigInt! # uint256
  reservedAmount: BigInt! # uint256
  burnedAmount: BigInt! # uint256
  machineInfos: [MachineInfo!]! @derivedFrom(field: "regionRef")
}

type RegionBurnInfo @entity{
  id: Bytes!
  region: String!
  burnedAmount: BigInt! # uint256
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# ============================================================
# Time-series event logs (Plan C — dashboard charts)
# Each event entity is immutable; id = tx hash + log index.
# ============================================================

enum MachineLifecycleKind {
  REGISTER
  UNREGISTER
  RENT_START
  RENT_END
  FAULT_REPORT
  OFFLINE_SLASH
  ONLINE_RECOVER
  EXIT_FOR_OFFLINE
}

type ClaimedEvent @entity(immutable: true) {
  id: Bytes!
  holder: Bytes!
  machineId: String!
  totalRewardAmount: BigInt!
  moveToUserWalletAmount: BigInt!
  moveToReservedAmount: BigInt!
  paidSlash: Boolean!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type StakedEvent @entity(immutable: true) {
  id: Bytes!
  holder: Bytes!
  machineId: String!
  originCalcPoint: BigInt!
  calcPoint: BigInt!
  region: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type UnstakedEvent @entity(immutable: true) {
  id: Bytes!
  holder: Bytes!
  machineId: String!
  paybackReserveAmount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SlashEvent @entity(immutable: true) {
  id: Bytes!
  machineId: String!
  holder: Bytes!              # recipient of slash (PaySlash.to) or stake holder (SlashMachineOnOffline)
  slashAmount: BigInt!
  kind: String!               # "PAY_SLASH" | "OFFLINE_SLASH"
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MachineLifecycleEvent @entity(immutable: true) {
  id: Bytes!
  machineId: String!
  kind: MachineLifecycleKind!
  actor: Bytes                # holder / renter (optional — some events carry it, some don't)
  calcPoint: BigInt           # REGISTER / UNREGISTER / ONLINE_RECOVER carry this
  slashId: BigInt             # FAULT_REPORT
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type DepositRewardEvent @entity(immutable: true) {
  id: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type RewardRateUpdateEvent @entity(immutable: true) {
  id: Bytes!
  accumulatedPerShareBefore: BigInt!
  accumulatedPerShareAfter: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# ============================================================
# Daily aggregate snapshots (Plan C — fast chart queries)
# id = UTC day number (floor(timestamp / 86400)), or composite.
# Snapshots write "current state at end of day" on each event.
# ============================================================

type StateSummaryDaily @entity {
  id: Bytes!                  # day id (BigInt → Bytes)
  dayStartTimestamp: BigInt!
  totalGPUCount: BigInt!
  totalStakingGPUCount: BigInt!
  totalBurnedReward: BigInt!
  totalReservedAmount: BigInt!
  totalCalcPoint: BigInt!
  totalRegionCount: BigInt!
  # deltas for this day (useful for bar charts)
  claimedAmountDelta: BigInt!
  burnedRewardDelta: BigInt!
  depositedRewardDelta: BigInt!
  slashAmountDelta: BigInt!
}

type RegionDaily @entity {
  id: Bytes!                  # keccak(region + day)
  region: String!
  dayStartTimestamp: BigInt!
  totalMachineCount: BigInt!
  stakingMachineCount: BigInt!
  totalBandwidth: BigInt!
  stakingBandwidth: BigInt!
  reservedAmount: BigInt!
  burnedAmountDelta: BigInt!  # burn THIS day
  claimedAmountDelta: BigInt! # rewards claimed by machines in this region THIS day
  slashAmountDelta: BigInt!   # slash amount for machines in this region THIS day
}

type HolderDaily @entity {
  id: Bytes!                  # keccak(holder + day)
  holder: Bytes!
  dayStartTimestamp: BigInt!
  totalClaimedRewardAmount: BigInt!   # cumulative at end of day
  totalReleasedRewardAmount: BigInt!  # cumulative at end of day
  claimedAmountDelta: BigInt!         # THIS day's claim sum
  activeMachineCount: BigInt!         # currently-staking machine count at end of day
}
